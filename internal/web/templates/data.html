{{ template "layout" . }}

{{ define "title" }}数据记录{{ end }}

{{ define "content" }}
<div x-data="dataRecordsData()" x-init="init()">
    <!-- 页面标题 -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">数据记录</h2>
        <div class="flex gap-2">
            <button @click="exportData('csv')" :disabled="exporting || records.length === 0" 
                    class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                导出 CSV
            </button>
            <button @click="exportData('json')" :disabled="exporting || records.length === 0" 
                    class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                导出 JSON
            </button>
        </div>
    </div>

    <!-- 筛选栏 -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 mb-6">
        <div class="flex flex-wrap gap-4 items-end">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">数据源</label>
                <select x-model="filter.source_id" 
                        class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 min-w-[150px]">
                    <option value="">全部数据源</option>
                    <template x-for="source in sources" :key="source.id">
                        <option :value="source.id" x-text="source.name"></option>
                    </template>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">开始日期</label>
                <input type="date" x-model="filter.start_date" 
                       class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">结束日期</label>
                <input type="date" x-model="filter.end_date" 
                       class="px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div class="flex gap-2">
                <button @click="applyFilter()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                    搜索
                </button>
                <button @click="resetFilter()" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
                    重置
                </button>
            </div>
        </div>
    </div>

    <!-- 批量操作栏 -->
    <div x-show="records.length > 0" class="bg-gray-50 rounded-lg p-3 mb-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" :checked="isAllSelected" @change="toggleSelectAll()" class="w-4 h-4 text-indigo-600 rounded">
                <span class="text-sm text-gray-700">全选</span>
            </label>
            <span x-show="selectedIds.length > 0" class="text-sm text-gray-500">
                已选择 <span x-text="selectedIds.length"></span> 条记录
            </span>
        </div>
        <button @click="openBatchDeleteModal()" :disabled="selectedIds.length === 0 || batchDeleting"
                class="px-3 py-1.5 bg-red-600 text-white text-sm rounded hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-1">
            <svg x-show="batchDeleting" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span x-text="batchDeleting ? '删除中...' : '批量删除'"></span>
        </button>
    </div>

    <!-- 加载状态 -->
    <div x-show="loading" class="flex justify-center items-center py-20">
        <svg class="animate-spin h-10 w-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </div>

    <!-- 数据表格 -->
    <div x-show="!loading" x-cloak class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-3 w-10">
                            <input type="checkbox" :checked="isAllSelected" @change="toggleSelectAll()" class="w-4 h-4 text-indigo-600 rounded">
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">数据源</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">数据</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">IP 地址</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User-Agent</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">创建时间</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <template x-for="record in records" :key="record.id">
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-4">
                                <input type="checkbox" :value="record.id" x-model="selectedIds" class="w-4 h-4 text-indigo-600 rounded">
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="record.id"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <span class="px-2 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs" x-text="getSourceName(record.source_id)"></span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-600">
                                <div>
                                    <div class="truncate max-w-xs cursor-pointer text-indigo-600 hover:text-indigo-800" 
                                         @click="toggleDataExpand(record.id)"
                                         x-text="getDataSummary(record.data)"></div>
                                    <div x-show="expandedData[record.id]" x-transition class="mt-2 p-3 bg-gray-900 rounded-lg overflow-x-auto">
                                        <pre class="text-green-400 text-xs font-mono" x-text="formatJSON(record.data)"></pre>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" x-text="record.ip_address || '-'"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600 max-w-xs">
                                <div class="truncate" x-text="truncate(record.user_agent, 30)" :title="record.user_agent"></div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(record.created_at)"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <button @click="openDeleteModal(record)" class="text-red-600 hover:text-red-800 font-medium">删除</button>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="records.length === 0">
                        <td colspan="8" class="px-6 py-8 text-center text-gray-500">
                            暂无数据记录
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页控件 -->
        <div x-show="total > 0" class="px-6 py-4 border-t border-gray-100 flex justify-between items-center">
            <div class="text-sm text-gray-500">
                共 <span x-text="total"></span> 条记录，第 <span x-text="filter.page"></span>/<span x-text="Math.ceil(total / filter.size)"></span> 页
            </div>
            <div class="flex gap-2">
                <button @click="prevPage()" :disabled="filter.page <= 1" 
                        class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                    上一页
                </button>
                <button @click="nextPage()" :disabled="filter.page * filter.size >= total" 
                        class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                    下一页
                </button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div x-show="showDeleteModal" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md m-4">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-800">确认删除</h3>
                </div>
                <p class="text-gray-600 mb-6">
                    确定要删除这条数据记录吗？此操作不可恢复。
                </p>
                <div class="flex justify-end gap-3">
                    <button @click="showDeleteModal = false" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        取消
                    </button>
                    <button @click="confirmDelete()" :disabled="deleting"
                            class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 disabled:opacity-50 flex items-center gap-2">
                        <svg x-show="deleting" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="deleting ? '删除中...' : '确认删除'"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 批量删除确认弹窗 -->
    <div x-show="showBatchDeleteModal" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md m-4">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-800">确认批量删除</h3>
                </div>
                <p class="text-gray-600 mb-6">
                    确定要删除选中的 <span x-text="selectedIds.length"></span> 条数据记录吗？此操作不可恢复。
                </p>
                <div class="flex justify-end gap-3">
                    <button @click="showBatchDeleteModal = false" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        取消
                    </button>
                    <button @click="confirmBatchDelete()" :disabled="batchDeleting"
                            class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 disabled:opacity-50 flex items-center gap-2">
                        <svg x-show="batchDeleting" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="batchDeleting ? '删除中...' : '确认删除'"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
function dataRecordsData() {
    return {
        loading: true,
        sources: [],
        records: [],
        total: 0,
        filter: {
            page: 1,
            size: 20,
            source_id: '',
            start_date: '',
            end_date: ''
        },
        
        // 展开的数据
        expandedData: {},
        
        // 选择相关
        selectedIds: [],
        
        // 删除
        showDeleteModal: false,
        deleteRecord: null,
        deleting: false,
        
        // 批量删除
        showBatchDeleteModal: false,
        batchDeleting: false,
        
        // 导出
        exporting: false,
        
        get isAllSelected() {
            return this.records.length > 0 && this.selectedIds.length === this.records.length;
        },
        
        async init() {
            if (!checkAuth()) return;
            await this.loadSources();
            await this.loadRecords();
        },
        
        async loadSources() {
            try {
                const result = await api.get('/api/v1/admin/sources?page=1&size=1000');
                if (result && result.code === 0) {
                    this.sources = result.data?.list || [];
                }
            } catch (err) {
                console.error('加载数据源列表失败:', err);
            }
        },
        
        async loadRecords() {
            this.loading = true;
            this.selectedIds = [];
            try {
                const params = new URLSearchParams();
                params.append('page', this.filter.page);
                params.append('size', this.filter.size);
                if (this.filter.source_id) params.append('source_id', this.filter.source_id);
                if (this.filter.start_date) params.append('start_date', this.filter.start_date);
                if (this.filter.end_date) params.append('end_date', this.filter.end_date);
                
                const result = await api.get(`/api/v1/admin/data?${params.toString()}`);
                if (result && result.code === 0) {
                    this.records = result.data?.list || [];
                    this.total = result.data?.total || 0;
                } else {
                    showToast(result.message || '加载数据失败', 'error');
                }
            } catch (err) {
                console.error('加载数据记录失败:', err);
                showToast('加载数据失败', 'error');
            } finally {
                this.loading = false;
            }
        },
        
        applyFilter() {
            this.filter.page = 1;
            this.loadRecords();
        },
        
        resetFilter() {
            this.filter = {
                page: 1,
                size: 20,
                source_id: '',
                start_date: '',
                end_date: ''
            };
            this.loadRecords();
        },
        
        prevPage() {
            if (this.filter.page > 1) {
                this.filter.page--;
                this.loadRecords();
            }
        },
        
        nextPage() {
            if (this.filter.page * this.filter.size < this.total) {
                this.filter.page++;
                this.loadRecords();
            }
        },
        
        toggleSelectAll() {
            if (this.isAllSelected) {
                this.selectedIds = [];
            } else {
                this.selectedIds = this.records.map(r => r.id);
            }
        },
        
        getSourceName(sourceId) {
            const source = this.sources.find(s => s.id === sourceId);
            return source ? source.name : `ID: ${sourceId}`;
        },
        
        getDataSummary(data) {
            if (!data) return '-';
            try {
                const obj = typeof data === 'string' ? JSON.parse(data) : data;
                const str = JSON.stringify(obj);
                return str.length > 50 ? str.substring(0, 50) + '... (点击展开)' : str;
            } catch (e) {
                return String(data).substring(0, 50);
            }
        },
        
        toggleDataExpand(recordId) {
            this.expandedData[recordId] = !this.expandedData[recordId];
        },
        
        openDeleteModal(record) {
            this.deleteRecord = record;
            this.showDeleteModal = true;
        },
        
        async confirmDelete() {
            if (!this.deleteRecord) return;
            
            this.deleting = true;
            try {
                const result = await api.del(`/api/v1/admin/data/${this.deleteRecord.id}`);
                if (result && result.code === 0) {
                    showToast('删除成功');
                    this.showDeleteModal = false;
                    this.deleteRecord = null;
                    await this.loadRecords();
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            } catch (err) {
                console.error('删除失败:', err);
                showToast('删除失败', 'error');
            } finally {
                this.deleting = false;
            }
        },
        
        openBatchDeleteModal() {
            if (this.selectedIds.length === 0) return;
            this.showBatchDeleteModal = true;
        },
        
        async confirmBatchDelete() {
            if (this.selectedIds.length === 0) return;
            
            this.batchDeleting = true;
            try {
                const result = await api.post('/api/v1/admin/data/batch-delete', { ids: this.selectedIds });
                if (result && result.code === 0) {
                    showToast(`成功删除 ${result.data?.count || this.selectedIds.length} 条记录`);
                    this.showBatchDeleteModal = false;
                    this.selectedIds = [];
                    await this.loadRecords();
                } else {
                    showToast(result.message || '批量删除失败', 'error');
                }
            } catch (err) {
                console.error('批量删除失败:', err);
                showToast('批量删除失败', 'error');
            } finally {
                this.batchDeleting = false;
            }
        },
        
        async exportData(format) {
            this.exporting = true;
            try {
                const params = new URLSearchParams();
                params.append('format', format);
                if (this.filter.source_id) params.append('source_id', this.filter.source_id);
                if (this.filter.start_date) params.append('start_date', this.filter.start_date);
                if (this.filter.end_date) params.append('end_date', this.filter.end_date);
                
                const token = api.getToken();
                const response = await fetch(`/api/v1/admin/data/export?${params.toString()}`, {
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const filename = response.headers.get('content-disposition')?.match(/filename="(.+)"/)?.[1] || `export.${format}`;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    showToast('导出成功');
                } else {
                    showToast('导出失败', 'error');
                }
            } catch (err) {
                console.error('导出失败:', err);
                showToast('导出失败', 'error');
            } finally {
                this.exporting = false;
            }
        }
    }
}
</script>
{{ end }}
