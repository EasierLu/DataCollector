<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataCollector - 登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div 
        x-data="{
            username: '',
            password: '',
            loading: false,
            error: '',
            
            get isValid() {
                return this.username.trim() !== '' && this.password.length >= 1;
            },
            
            async login() {
                if (!this.isValid) return;
                
                this.loading = true;
                this.error = '';
                
                try {
                    const response = await fetch('/api/v1/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username: this.username,
                            password: this.password
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.code === 0 && data.data) {
                        // 保存 token
                        localStorage.setItem('jwt_token', data.data.token);
                        // 跳转到仪表盘
                        window.location.href = '/dashboard';
                    } else {
                        this.error = data.message || '登录失败';
                    }
                } catch (err) {
                    this.error = '登录请求失败: ' + err.message;
                } finally {
                    this.loading = false;
                }
            }
        }"
        class="w-full max-w-md bg-white rounded-2xl shadow-xl overflow-hidden"
        @keydown.enter="login()"
    >
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-8 text-center">
            <div class="flex justify-center mb-4">
                <svg class="w-16 h-16 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">DataCollector</h1>
            <p class="text-indigo-100 mt-1">管理后台登录</p>
        </div>
        
        <!-- Login Form -->
        <div class="px-8 py-8">
            <!-- Error Message -->
            <div 
                x-show="error" 
                x-transition
                x-cloak
                class="mb-6 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700"
            >
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                    </svg>
                    <span x-text="error"></span>
                </div>
            </div>
            
            <div class="space-y-5">
                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">用户名</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <input 
                            type="text" 
                            x-model="username"
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="请输入用户名"
                            autocomplete="username"
                        >
                    </div>
                </div>
                
                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">密码</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input 
                            type="password" 
                            x-model="password"
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="请输入密码"
                            autocomplete="current-password"
                        >
                    </div>
                </div>
            </div>
            
            <!-- Login Button -->
            <div class="mt-8">
                <button 
                    @click="login"
                    :disabled="loading || !isValid"
                    class="w-full py-3 px-4 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center justify-center font-medium"
                >
                    <span x-show="loading" class="mr-2">
                        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <span x-text="loading ? '登录中...' : '登录'"></span>
                </button>
            </div>
            
            <!-- Footer -->
            <div class="mt-6 text-center text-sm text-gray-500">
                <p>DataCollector 数据采集系统</p>
            </div>
        </div>
    </div>
    
    <script>
        // 如果已登录，直接跳转到仪表盘
        if (localStorage.getItem('jwt_token')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
