{{ template "layout" . }}

{{ define "title" }}数据源管理{{ end }}

{{ define "content" }}
<div x-data="sourcesData()" x-init="init()">
    <!-- 页面标题 -->
    <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-bold text-gray-800">数据源管理</h2>
        <button @click="openCreateModal()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition-colors flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            创建数据源
        </button>
    </div>

    <!-- 加载状态 -->
    <div x-show="loading" class="flex justify-center items-center py-20">
        <svg class="animate-spin h-10 w-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </div>

    <!-- 数据源列表 -->
    <div x-show="!loading" x-cloak class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">名称</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Token 数量</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">创建时间</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <template x-for="source in sources" :key="source.id">
                        <tr class="hover:bg-gray-50">
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="source.id"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 font-medium" x-text="source.name"></td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 py-1 text-xs rounded-full" 
                                      :class="source.status === 1 ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                                      x-text="source.status === 1 ? '启用' : '禁用'">
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" x-text="source.token_count || 0"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(source.created_at)"></td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm">
                                <div class="flex items-center gap-2">
                                    <a :href="'/sources/' + source.id" class="text-indigo-600 hover:text-indigo-800 font-medium">查看详情</a>
                                    <button @click="openEditModal(source)" class="text-blue-600 hover:text-blue-800 font-medium">编辑</button>
                                    <button @click="openDeleteModal(source)" class="text-red-600 hover:text-red-800 font-medium">删除</button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="sources.length === 0">
                        <td colspan="6" class="px-6 py-8 text-center text-gray-500">
                            暂无数据源，点击"创建数据源"按钮添加
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页控件 -->
        <div x-show="total > 0" class="px-6 py-4 border-t border-gray-100 flex justify-between items-center">
            <div class="text-sm text-gray-500">
                共 <span x-text="total"></span> 条记录，第 <span x-text="page"></span>/<span x-text="Math.ceil(total / size)"></span> 页
            </div>
            <div class="flex gap-2">
                <button @click="prevPage()" :disabled="page <= 1" 
                        class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                    上一页
                </button>
                <button @click="nextPage()" :disabled="page * size >= total" 
                        class="px-3 py-1 border border-gray-300 rounded hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                    下一页
                </button>
            </div>
        </div>
    </div>

    <!-- 创建/编辑数据源模态框 -->
    <div x-show="showModal" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" @click.self="closeModal()">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto m-4">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-800" x-text="isEditing ? '编辑数据源' : '创建数据源'"></h3>
                <button @click="closeModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div class="p-6">
                <div class="space-y-4">
                    <!-- 名称 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">名称 <span class="text-red-500">*</span></label>
                        <input type="text" x-model="form.name" 
                               class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                               placeholder="请输入数据源名称">
                    </div>
                    <!-- 描述 -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">描述</label>
                        <textarea x-model="form.description" rows="2"
                                  class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                                  placeholder="请输入数据源描述"></textarea>
                    </div>
                    <!-- Schema 配置 -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-medium text-gray-700">Schema 字段配置</label>
                            <button @click="addSchemaField()" class="text-sm text-indigo-600 hover:text-indigo-800 flex items-center gap-1">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                                </svg>
                                添加字段
                            </button>
                        </div>
                        <div class="space-y-2">
                            <template x-for="(field, index) in form.schema_fields" :key="index">
                                <div class="flex gap-2 items-start bg-gray-50 p-3 rounded-lg">
                                    <div class="flex-1">
                                        <input type="text" x-model="field.name" placeholder="字段名"
                                               class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500">
                                    </div>
                                    <div class="w-32">
                                        <select x-model="field.type" 
                                                class="w-full px-3 py-1.5 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-indigo-500">
                                            <option value="string">字符串</option>
                                            <option value="number">数字</option>
                                            <option value="boolean">布尔</option>
                                            <option value="array">数组</option>
                                            <option value="object">对象</option>
                                        </select>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <label class="flex items-center text-sm">
                                            <input type="checkbox" x-model="field.required" class="mr-1">
                                            必填
                                        </label>
                                    </div>
                                    <button @click="removeSchemaField(index)" class="text-red-500 hover:text-red-700 p-1">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                        </svg>
                                    </button>
                                </div>
                            </template>
                            <div x-show="form.schema_fields.length === 0" class="text-center py-4 text-gray-500 text-sm">
                                暂无字段配置，点击"添加字段"按钮添加
                            </div>
                        </div>
                    </div>
                </div>
                <!-- 错误提示 -->
                <div x-show="formError" x-transition class="mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm" x-text="formError"></div>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3">
                <button @click="closeModal()" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                    取消
                </button>
                <button @click="saveSource()" :disabled="saving || !form.name.trim()" 
                        class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
                    <svg x-show="saving" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span x-text="saving ? '保存中...' : '保存'"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div x-show="showDeleteModal" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md m-4">
            <div class="p-6">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-800">确认删除</h3>
                </div>
                <p class="text-gray-600 mb-6">
                    确定要删除数据源 "<span x-text="deleteSource?.name"></span>" 吗？此操作不可恢复，该数据源下的所有 Token 也将被删除。
                </p>
                <div class="flex justify-end gap-3">
                    <button @click="showDeleteModal = false" class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">
                        取消
                    </button>
                    <button @click="confirmDelete()" :disabled="deleting"
                            class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 disabled:opacity-50 flex items-center gap-2">
                        <svg x-show="deleting" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span x-text="deleting ? '删除中...' : '确认删除'"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
function sourcesData() {
    return {
        loading: true,
        sources: [],
        page: 1,
        size: 10,
        total: 0,
        
        // 模态框状态
        showModal: false,
        isEditing: false,
        editingId: null,
        saving: false,
        formError: '',
        form: {
            name: '',
            description: '',
            schema_fields: []
        },
        
        // 删除确认
        showDeleteModal: false,
        deleteSource: null,
        deleting: false,
        
        async init() {
            if (!checkAuth()) return;
            await this.loadSources();
        },
        
        async loadSources() {
            this.loading = true;
            try {
                const result = await api.get(`/api/v1/admin/sources?page=${this.page}&size=${this.size}`);
                if (result && result.code === 0) {
                    this.sources = result.data?.list || [];
                    this.total = result.data?.total || 0;
                } else {
                    showToast(result.message || '加载数据源失败', 'error');
                }
            } catch (err) {
                console.error('加载数据源失败:', err);
                showToast('加载数据源失败', 'error');
            } finally {
                this.loading = false;
            }
        },
        
        prevPage() {
            if (this.page > 1) {
                this.page--;
                this.loadSources();
            }
        },
        
        nextPage() {
            if (this.page * this.size < this.total) {
                this.page++;
                this.loadSources();
            }
        },
        
        openCreateModal() {
            this.isEditing = false;
            this.editingId = null;
            this.form = {
                name: '',
                description: '',
                schema_fields: []
            };
            this.formError = '';
            this.showModal = true;
        },
        
        openEditModal(source) {
            this.isEditing = true;
            this.editingId = source.id;
            
            // 解析 schema_config
            let schemaFields = [];
            if (source.schema_config) {
                try {
                    const schema = typeof source.schema_config === 'string' 
                        ? JSON.parse(source.schema_config) 
                        : source.schema_config;
                    if (schema.fields && Array.isArray(schema.fields)) {
                        schemaFields = schema.fields;
                    }
                } catch (e) {
                    console.error('解析 schema_config 失败:', e);
                }
            }
            
            this.form = {
                name: source.name || '',
                description: source.description || '',
                schema_fields: schemaFields
            };
            this.formError = '';
            this.showModal = true;
        },
        
        closeModal() {
            this.showModal = false;
            this.formError = '';
        },
        
        addSchemaField() {
            this.form.schema_fields.push({
                name: '',
                type: 'string',
                required: false
            });
        },
        
        removeSchemaField(index) {
            this.form.schema_fields.splice(index, 1);
        },
        
        async saveSource() {
            if (!this.form.name.trim()) {
                this.formError = '请输入数据源名称';
                return;
            }
            
            this.saving = true;
            this.formError = '';
            
            // 构建 schema_config
            const schemaConfig = {
                fields: this.form.schema_fields.filter(f => f.name.trim() !== '')
            };
            
            const data = {
                name: this.form.name.trim(),
                description: this.form.description.trim(),
                schema_config: schemaConfig
            };
            
            try {
                let result;
                if (this.isEditing) {
                    result = await api.put(`/api/v1/admin/sources/${this.editingId}`, data);
                } else {
                    result = await api.post('/api/v1/admin/sources', data);
                }
                
                if (result && result.code === 0) {
                    showToast(this.isEditing ? '更新成功' : '创建成功');
                    this.closeModal();
                    await this.loadSources();
                } else {
                    this.formError = result.message || (this.isEditing ? '更新失败' : '创建失败');
                }
            } catch (err) {
                console.error('保存数据源失败:', err);
                this.formError = '保存失败，请重试';
            } finally {
                this.saving = false;
            }
        },
        
        openDeleteModal(source) {
            this.deleteSource = source;
            this.showDeleteModal = true;
        },
        
        async confirmDelete() {
            if (!this.deleteSource) return;
            
            this.deleting = true;
            try {
                const result = await api.del(`/api/v1/admin/sources/${this.deleteSource.id}`);
                if (result && result.code === 0) {
                    showToast('删除成功');
                    this.showDeleteModal = false;
                    this.deleteSource = null;
                    await this.loadSources();
                } else {
                    showToast(result.message || '删除失败', 'error');
                }
            } catch (err) {
                console.error('删除数据源失败:', err);
                showToast('删除失败', 'error');
            } finally {
                this.deleting = false;
            }
        }
    }
}
</script>
{{ end }}
