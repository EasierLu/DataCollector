<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataCollector 系统初始化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div 
        x-data="{
            step: 1,
            dbDriver: 'sqlite',
            sqlitePath: './data/datacollector.db',
            pgHost: 'localhost',
            pgPort: 5432,
            pgUser: 'datacollector',
            pgPassword: '',
            pgDbname: 'datacollector',
            adminUsername: 'admin',
            adminPassword: '',
            adminPasswordConfirm: '',
            testing: false,
            testResult: '',
            testSuccess: false,
            initializing: false,
            initSuccess: false,
            error: '',
            
            get isStep1Valid() {
                if (this.dbDriver === 'sqlite') {
                    return this.sqlitePath.trim() !== '';
                } else {
                    return this.pgHost.trim() !== '' && 
                           this.pgPort > 0 && 
                           this.pgUser.trim() !== '' && 
                           this.pgPassword !== '' && 
                           this.pgDbname.trim() !== '';
                }
            },
            
            get isStep2Valid() {
                return this.adminUsername.trim() !== '' && 
                       this.adminPassword.length >= 6 && 
                       this.adminPassword === this.adminPasswordConfirm;
            },
            
            get passwordError() {
                if (this.adminPassword && this.adminPassword.length < 6) {
                    return '密码至少需要6位';
                }
                if (this.adminPasswordConfirm && this.adminPassword !== this.adminPasswordConfirm) {
                    return '两次输入的密码不一致';
                }
                return '';
            },
            
            async testConnection() {
                this.testing = true;
                this.testResult = '';
                this.testSuccess = false;
                
                const body = {
                    driver: this.dbDriver,
                    host: this.pgHost,
                    port: parseInt(this.pgPort),
                    user: this.pgUser,
                    password: this.pgPassword,
                    dbname: this.pgDbname
                };
                
                try {
                    const response = await fetch('/api/v1/setup/test-db', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await response.json();
                    
                    if (data.code === 0) {
                        this.testResult = '连接成功！';
                        this.testSuccess = true;
                    } else {
                        this.testResult = data.message || '连接失败';
                        this.testSuccess = false;
                    }
                } catch (err) {
                    this.testResult = '请求失败: ' + err.message;
                    this.testSuccess = false;
                } finally {
                    this.testing = false;
                }
            },
            
            async initialize() {
                this.initializing = true;
                this.error = '';
                
                const body = {
                    database: {
                        driver: this.dbDriver,
                        sqlite: { path: this.sqlitePath },
                        postgres: {
                            host: this.pgHost,
                            port: parseInt(this.pgPort),
                            user: this.pgUser,
                            password: this.pgPassword,
                            dbname: this.pgDbname,
                            sslmode: 'disable'
                        }
                    },
                    server: { port: 8080 },
                    admin: {
                        username: this.adminUsername,
                        password: this.adminPassword
                    }
                };
                
                try {
                    const response = await fetch('/api/v1/setup/init', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    const data = await response.json();
                    
                    if (data.code === 0) {
                        this.initSuccess = true;
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 3000);
                    } else {
                        this.error = data.message || '初始化失败';
                    }
                } catch (err) {
                    this.error = '请求失败: ' + err.message;
                } finally {
                    this.initializing = false;
                }
            },
            
            nextStep() {
                if (this.step < 3) {
                    this.step++;
                }
            },
            
            prevStep() {
                if (this.step > 1) {
                    this.step--;
                }
            }
        }"
        class="w-full max-w-2xl bg-white rounded-2xl shadow-xl overflow-hidden"
    >
        <!-- Header -->
        <div class="bg-gradient-to-r from-indigo-600 to-blue-600 px-8 py-6">
            <h1 class="text-2xl font-bold text-white">DataCollector 系统初始化</h1>
            <p class="text-indigo-100 mt-1">欢迎使用 DataCollector，请完成以下配置以开始使用</p>
        </div>
        
        <!-- Step Indicator -->
        <div class="px-8 py-6 border-b border-gray-100">
            <div class="flex items-center justify-center space-x-4">
                <div class="flex items-center">
                    <div 
                        class="w-10 h-10 rounded-full flex items-center justify-center font-semibold transition-colors duration-300"
                        :class="step >= 1 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'"
                    >
                        1
                    </div>
                    <span class="ml-2 text-sm font-medium" :class="step >= 1 ? 'text-indigo-600' : 'text-gray-400'">数据库配置</span>
                </div>
                <div class="w-12 h-0.5" :class="step >= 2 ? 'bg-indigo-600' : 'bg-gray-200'"></div>
                <div class="flex items-center">
                    <div 
                        class="w-10 h-10 rounded-full flex items-center justify-center font-semibold transition-colors duration-300"
                        :class="step >= 2 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'"
                    >
                        2
                    </div>
                    <span class="ml-2 text-sm font-medium" :class="step >= 2 ? 'text-indigo-600' : 'text-gray-400'">创建管理员</span>
                </div>
                <div class="w-12 h-0.5" :class="step >= 3 ? 'bg-indigo-600' : 'bg-gray-200'"></div>
                <div class="flex items-center">
                    <div 
                        class="w-10 h-10 rounded-full flex items-center justify-center font-semibold transition-colors duration-300"
                        :class="step >= 3 ? 'bg-indigo-600 text-white' : 'bg-gray-200 text-gray-500'"
                    >
                        3
                    </div>
                    <span class="ml-2 text-sm font-medium" :class="step >= 3 ? 'text-indigo-600' : 'text-gray-400'">完成</span>
                </div>
            </div>
        </div>
        
        <!-- Step 1: Database Configuration -->
        <div x-show="step === 1" x-cloak class="px-8 py-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">数据库配置</h2>
            
            <!-- Database Type Selection -->
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">数据库类型</label>
                <div class="flex space-x-4">
                    <label class="flex items-center cursor-pointer">
                        <input 
                            type="radio" 
                            x-model="dbDriver" 
                            value="sqlite" 
                            class="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500"
                        >
                        <span class="ml-2 text-gray-700">SQLite</span>
                    </label>
                    <label class="flex items-center cursor-pointer">
                        <input 
                            type="radio" 
                            x-model="dbDriver" 
                            value="postgres" 
                            class="w-4 h-4 text-indigo-600 border-gray-300 focus:ring-indigo-500"
                        >
                        <span class="ml-2 text-gray-700">PostgreSQL</span>
                    </label>
                </div>
            </div>
            
            <!-- SQLite Configuration -->
            <div x-show="dbDriver === 'sqlite'" x-transition class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">数据库文件路径</label>
                    <input 
                        type="text" 
                        x-model="sqlitePath"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                        placeholder="./data/datacollector.db"
                    >
                    <p class="mt-1 text-xs text-gray-500">SQLite 数据库文件将存储在此路径</p>
                </div>
            </div>
            
            <!-- PostgreSQL Configuration -->
            <div x-show="dbDriver === 'postgres'" x-transition class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">主机地址</label>
                        <input 
                            type="text" 
                            x-model="pgHost"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="localhost"
                        >
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">端口</label>
                        <input 
                            type="number" 
                            x-model="pgPort"
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="5432"
                        >
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input 
                        type="text" 
                        x-model="pgUser"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                        placeholder="datacollector"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input 
                        type="password" 
                        x-model="pgPassword"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                        placeholder="请输入数据库密码"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">数据库名称</label>
                    <input 
                        type="text" 
                        x-model="pgDbname"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                        placeholder="datacollector"
                    >
                </div>
                
                <!-- Test Connection Button -->
                <button 
                    @click="testConnection"
                    :disabled="testing || !isStep1Valid"
                    class="w-full py-2 px-4 border border-indigo-600 text-indigo-600 rounded-lg hover:bg-indigo-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center justify-center"
                >
                    <span x-show="testing" class="mr-2">
                        <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <span x-text="testing ? '测试中...' : '测试连接'"></span>
                </button>
                
                <!-- Test Result -->
                <div 
                    x-show="testResult" 
                    x-transition
                    class="p-3 rounded-lg text-sm"
                    :class="testSuccess ? 'bg-green-50 text-green-700 border border-green-200' : 'bg-red-50 text-red-700 border border-red-200'"
                >
                    <span x-text="testResult"></span>
                </div>
            </div>
            
            <!-- Navigation -->
            <div class="mt-8 flex justify-end">
                <button 
                    @click="nextStep"
                    :disabled="!isStep1Valid"
                    class="py-2 px-6 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                >
                    下一步
                </button>
            </div>
        </div>
        
        <!-- Step 2: Create Admin -->
        <div x-show="step === 2" x-cloak class="px-8 py-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">创建管理员账户</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input 
                        type="text" 
                        x-model="adminUsername"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                        placeholder="admin"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input 
                        type="password" 
                        x-model="adminPassword"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                        placeholder="请输入密码（至少6位）"
                    >
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                    <input 
                        type="password" 
                        x-model="adminPasswordConfirm"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                        placeholder="请再次输入密码"
                    >
                    <p x-show="passwordError" x-transition class="mt-1 text-sm text-red-600" x-text="passwordError"></p>
                </div>
            </div>
            
            <!-- Navigation -->
            <div class="mt-8 flex justify-between">
                <button 
                    @click="prevStep"
                    class="py-2 px-6 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors"
                >
                    上一步
                </button>
                <button 
                    @click="nextStep"
                    :disabled="!isStep2Valid"
                    class="py-2 px-6 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                >
                    下一步
                </button>
            </div>
        </div>
        
        <!-- Step 3: Complete -->
        <div x-show="step === 3" x-cloak class="px-8 py-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">配置摘要</h2>
            
            <div class="bg-gray-50 rounded-lg p-4 space-y-3">
                <div class="flex justify-between">
                    <span class="text-gray-600">数据库类型</span>
                    <span class="font-medium text-gray-800" x-text="dbDriver === 'sqlite' ? 'SQLite' : 'PostgreSQL'"></span>
                </div>
                <div x-show="dbDriver === 'sqlite'" class="flex justify-between">
                    <span class="text-gray-600">数据库路径</span>
                    <span class="font-medium text-gray-800" x-text="sqlitePath"></span>
                </div>
                <div x-show="dbDriver === 'postgres'" class="flex justify-between">
                    <span class="text-gray-600">数据库地址</span>
                    <span class="font-medium text-gray-800" x-text="pgHost + ':' + pgPort"></span>
                </div>
                <div class="border-t border-gray-200 pt-3 flex justify-between">
                    <span class="text-gray-600">管理员用户名</span>
                    <span class="font-medium text-gray-800" x-text="adminUsername"></span>
                </div>
            </div>
            
            <!-- Success Message -->
            <div 
                x-show="initSuccess" 
                x-transition
                class="mt-4 p-4 bg-green-50 border border-green-200 rounded-lg text-green-700"
            >
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                    </svg>
                    <span>初始化成功！3秒后跳转到登录页面...</span>
                </div>
            </div>
            
            <!-- Error Message -->
            <div 
                x-show="error" 
                x-transition
                class="mt-4 p-4 bg-red-50 border border-red-200 rounded-lg text-red-700"
            >
                <div class="flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                    </svg>
                    <span x-text="error"></span>
                </div>
            </div>
            
            <!-- Navigation -->
            <div class="mt-8 flex justify-between">
                <button 
                    @click="prevStep"
                    :disabled="initializing || initSuccess"
                    class="py-2 px-6 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
                >
                    上一步
                </button>
                <button 
                    @click="initialize"
                    :disabled="initializing || initSuccess"
                    class="py-2 px-6 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors flex items-center"
                >
                    <span x-show="initializing" class="mr-2">
                        <svg class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </span>
                    <span x-text="initializing ? '初始化中...' : '完成初始化'"></span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
