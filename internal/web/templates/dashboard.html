{{ template "layout" . }}

{{ define "title" }}仪表盘{{ end }}

{{ define "content" }}
<div x-data="dashboardData()" x-init="init()">
    <!-- 加载状态 -->
    <div x-show="loading" class="flex justify-center items-center py-20">
        <svg class="animate-spin h-10 w-10 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
    </div>

    <!-- 内容区域 -->
    <div x-show="!loading" x-cloak>
        <!-- 统计卡片行 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- 今日数据量 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">今日数据量</p>
                        <p class="text-3xl font-bold text-gray-800 mt-2" x-text="stats.today_count || 0"></p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 flex items-center text-sm">
                    <span class="text-green-500 flex items-center">
                        <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                        </svg>
                        实时
                    </span>
                    <span class="text-gray-400 ml-2">更新</span>
                </div>
            </div>

            <!-- 本周数据量 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">本周数据量</p>
                        <p class="text-3xl font-bold text-gray-800 mt-2" x-text="stats.week_count || 0"></p>
                    </div>
                    <div class="w-12 h-12 bg-indigo-100 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm text-gray-400">本周累计</div>
            </div>

            <!-- 本月数据量 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">本月数据量</p>
                        <p class="text-3xl font-bold text-gray-800 mt-2" x-text="stats.month_count || 0"></p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm text-gray-400">本月累计</div>
            </div>

            <!-- 数据源总数 -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500">数据源总数</p>
                        <p class="text-3xl font-bold text-gray-800 mt-2" x-text="stats.total_sources || 0"></p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path>
                        </svg>
                    </div>
                </div>
                <div class="mt-4 text-sm text-gray-400">
                    <a href="/sources" class="text-indigo-600 hover:text-indigo-800">查看全部 →</a>
                </div>
            </div>
        </div>

        <!-- WebSocket 连接状态 -->
        <div class="bg-white rounded-xl shadow-sm p-4 mb-8 border border-gray-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 rounded-full" :class="wsConnected ? 'bg-green-500 animate-pulse' : 'bg-red-500'"></div>
                <span class="text-sm text-gray-600">
                    实时连接状态: <span x-text="wsConnected ? '已连接' : '未连接'"></span>
                </span>
            </div>
            <button @click="reconnectWS()" class="text-sm text-indigo-600 hover:text-indigo-800 flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
                重连
            </button>
        </div>

        <!-- 最近数据记录 -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="text-lg font-semibold text-gray-800">最近数据记录</h3>
                <a href="/data" class="text-sm text-indigo-600 hover:text-indigo-800">查看全部 →</a>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">数据源</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">数据摘要</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">IP 地址</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">创建时间</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <template x-for="record in recentRecords" :key="record.id">
                            <tr class="hover:bg-gray-50">
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" x-text="record.id"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                                    <span class="px-2 py-1 bg-indigo-100 text-indigo-700 rounded-full text-xs" x-text="'ID: ' + record.source_id"></span>
                                </td>
                                <td class="px-6 py-4 text-sm text-gray-600 max-w-xs">
                                    <div class="truncate" x-text="getDataSummary(record.data)"></div>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" x-text="record.ip_address || '-'"></td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" x-text="formatDate(record.created_at)"></td>
                            </tr>
                        </template>
                        <tr x-show="recentRecords.length === 0">
                            <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                                暂无数据记录
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
function dashboardData() {
    return {
        loading: true,
        stats: {
            today_count: 0,
            week_count: 0,
            month_count: 0,
            total_sources: 0
        },
        recentRecords: [],
        wsConnected: false,
        ws: null,
        
        async init() {
            if (!checkAuth()) return;
            await this.loadData();
            this.connectWebSocket();
        },
        
        async loadData() {
            try {
                const result = await api.get('/api/v1/admin/dashboard');
                if (result && result.code === 0) {
                    this.stats = {
                        today_count: result.data.today_count || 0,
                        week_count: result.data.week_count || 0,
                        month_count: result.data.month_count || 0,
                        total_sources: result.data.total_sources || 0
                    };
                    this.recentRecords = result.data.recent_records || [];
                } else {
                    showToast(result.message || '加载数据失败', 'error');
                }
            } catch (err) {
                console.error('加载仪表盘数据失败:', err);
                showToast('加载数据失败', 'error');
            } finally {
                this.loading = false;
            }
        },
        
        connectWebSocket() {
            const token = api.getToken();
            if (!token) return;
            
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/api/v1/admin/ws/monitor?token=${token}`;
            
            try {
                this.ws = new WebSocket(wsUrl);
                
                this.ws.onopen = () => {
                    console.log('WebSocket 已连接');
                    this.wsConnected = true;
                };
                
                this.ws.onmessage = (event) => {
                    try {
                        const message = JSON.parse(event.data);
                        if (message.type === 'stats_update') {
                            // 更新统计数据
                            if (message.data.today_count !== undefined) {
                                this.stats.today_count = message.data.today_count;
                            }
                            if (message.data.week_count !== undefined) {
                                this.stats.week_count = message.data.week_count;
                            }
                            if (message.data.month_count !== undefined) {
                                this.stats.month_count = message.data.month_count;
                            }
                        }
                    } catch (e) {
                        console.error('解析 WebSocket 消息失败:', e);
                    }
                };
                
                this.ws.onclose = () => {
                    console.log('WebSocket 已断开');
                    this.wsConnected = false;
                    // 5秒后尝试重连
                    setTimeout(() => this.connectWebSocket(), 5000);
                };
                
                this.ws.onerror = (error) => {
                    console.error('WebSocket 错误:', error);
                    this.wsConnected = false;
                };
            } catch (err) {
                console.error('连接 WebSocket 失败:', err);
            }
        },
        
        reconnectWS() {
            if (this.ws) {
                this.ws.close();
            }
            this.connectWebSocket();
        },
        
        getDataSummary(data) {
            if (!data) return '-';
            try {
                const obj = typeof data === 'string' ? JSON.parse(data) : data;
                const str = JSON.stringify(obj);
                return str.length > 50 ? str.substring(0, 50) + '...' : str;
            } catch (e) {
                return String(data).substring(0, 50);
            }
        }
    }
}
</script>
{{ end }}
