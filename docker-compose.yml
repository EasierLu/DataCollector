# docker-compose.yml

services:
  # 默认：SQLite 模式
  datacollector:
    build: .
    container_name: datacollector
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DB_DRIVER=sqlite
      - DB_SQLITE_PATH=/app/data/datacollector.db
    restart: unless-stopped

