# docker-compose.yml

services:
  # 默认：SQLite 模式
  datacollector:
    build: .
    container_name: datacollector
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - DB_DRIVER=sqlite
      - DB_SQLITE_PATH=/app/data/datacollector.db
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/setup/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

